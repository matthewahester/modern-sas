  page-footer:
    left: "© 2026 Matt Hester · Modern SAS for Statistical Analytics"
    center: "[Matt Hester · matthewhester.com](https://matthewhester.com/)"
    right: "Built with [Quarto](https://quarto.org)"

format:
  html:
    theme: cosmo
    css: styles.css
    toc: true
    toc-location: right
    anchor-sections: true
    smooth-scroll: true
    link-external-newwindow: true
    fontsize: 1.05em
    mainfont: "Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
    monofont: "JetBrains Mono, Consolas, Menlo, monospace"
# SAS is shown as static, non-executed ```sas fences in this diagnostic; logs and PROC output are shown as
# typed synthetic listings. No SAS engine is invoked, so the render is deterministic and SAS-free.
